            );
            renderList(filtered);
            dropdown.classList.remove('hidden');
        });

        searchInput.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('hidden');
            renderList(COUNTRY_DATA);
        });

        document.addEventListener('click', () => dropdown.classList.add('hidden'));

        function generateProxies() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const country = document.getElementById('countryCode').value;
            const count = parseInt(document.getElementById('count').value);
            const portStart = parseInt(document.getElementById('portStart').value);
            const host = document.getElementById('hostname').value;

            if (!user || !pass || !count) return;

            let proxies = [];
            for (let i = 0; i < count; i++) {
                const port = portStart + i;
                const cSuffix = (country === 'all') ? '' : `__cr.${country}`;
                proxies.push(`${user}${cSuffix}:${pass}@${host}:${port}`);
            }
            document.getElementById('output').value = proxies.join('\n');
            document.getElementById('outputContainer').classList.remove('hidden');
        }

        function copyToClipboard() {
            const textarea = document.getElementById('output');
            textarea.select();
            document.execCommand('copy');
            document.getElementById('copyBtn').innerText = "Copied!";
            setTimeout(() => document.getElementById('copyBtn').innerText = "Copy All", 2000);
        }

        function downloadAsTxt() {
            const text = document.getElementById('output').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'proxies.txt';
            a.click();
        }

        window.onload = () => renderList(COUNTRY_DATA);
    </script>
</body>
</html>
