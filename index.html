<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKB ELITE - Multi Proxy Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4;
            color: #1a202c;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Responsive stack for mobile */
        @media (max-width: 1024px) {
            .page-wrapper {
                flex-direction: column;
            }
            .side-panel {
                width: 100% !important;
            }
        }

        .side-panel {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(22, 101, 52, 0.08);
            border: 1px solid #dcfce7;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .left-panel {
            width: 60%; /* Input side */
        }

        .right-panel {
            width: 40%; /* Output side */
        }

        .label-text {
            font-size: 14px;
            font-weight: 600;
            color: #166534;
            margin-bottom: 8px;
            display: block;
            margin-left: 4px;
        }

        .input-box {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 18px;
            width: 100%;
            transition: all 0.3s;
            color: #2d3748;
            font-size: 16px;
        }
        .input-box:focus {
            border-color: #22c55e;
            outline: none;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        #countryDropdown {
            background: white;
            border: 1px solid #dcfce7;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(22, 101, 52, 0.12);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
        }

        .country-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0fdf4;
        }
        .country-item:hover { background: #f0fdf4; }
        .country-item .flag { font-size: 20px; margin-right: 12px; }

        .chip {
            display: inline-flex;
            align-items: center;
            background: #f0fdf4;
            color: #166534;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin: 2px;
            border: 1px solid #bbf7d0;
        }

        .btn-generate {
            background: linear-gradient(135deg, #22c55e 0%, #166534 100%);
            color: white;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .output-area {
            background: #064e3b;
            color: #6ee7b7;
            font-family: 'Fira Code', monospace;
            border-radius: 14px;
            padding: 20px;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid #065f46;
            flex-grow: 1;
            resize: none;
        }

        .placeholder-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #86efac;
            text-align: center;
            border: 2px dashed #dcfce7;
            border-radius: 14px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <!-- Left Side: Generator Tools (Now on the Left) -->
        <div class="side-panel left-panel">
            <header class="mb-8 text-left border-b border-green-50 pb-6">
                <h1 class="text-4xl font-extrabold text-gray-900">RKB ELITE <span class="text-green-600">PRO</span></h1>
                <p class="text-green-700 text-sm font-medium uppercase tracking-widest mt-1">Multi-Country Engine</p>
            </header>

            <div class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="label-text">Username</label>
                        <input type="text" id="username" placeholder="User ID" class="input-box">
                    </div>
                    <div>
                        <label class="label-text">Password</label>
                        <input type="text" id="password" placeholder="Pass Key" class="input-box">
                    </div>
                </div>

                <div class="relative">
                    <label class="label-text">Target Geos (Select countries)</label>
                    <div class="input-box flex flex-wrap gap-2 min-h-[55px] items-center" id="selectorContainer">
                        <div id="selectedChips" class="flex flex-wrap gap-1"></div>
                        <input type="text" id="countrySearch" placeholder="Type country name..." autocomplete="off" 
                            class="flex-grow outline-none bg-transparent">
                    </div>
                    <div id="countryDropdown" class="hidden absolute w-full mt-2">
                        <div id="countryList"></div>
                    </div>
                </div>

                <div>
                    <label class="label-text">Quantity</label>
                    <input type="number" id="count" value="100" class="input-box">
                </div>

                <input type="hidden" id="hostname" value="gw.dataimpulse.com">

                <button onclick="generateProxies()" class="btn-generate">
                    Start Generation
                </button>
            </div>
        </div>

        <!-- Right Side: Output Area (Now on the Right) -->
        <div class="side-panel right-panel">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h3 class="text-xl font-bold text-green-900">Generated Proxies</h3>
                    <p class="text-xs text-green-600">Total list will appear here</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyToClipboard()" id="copyBtn" class="bg-green-100 text-green-800 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-green-200">Copy</button>
                    <button onclick="downloadAsTxt()" class="bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-gray-200">Txt</button>
                </div>
            </div>
            
            <div id="noOutput" class="placeholder-text">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="font-medium">No Proxies Generated Yet</p>
            </div>
            
            <textarea id="output" readonly class="hidden output-area outline-none"></textarea>
        </div>

    </div>

    <script>
        const COUNTRY_DATA = [
            { n: "United States", c: "us", f: "🇺🇸" }, { n: "United Kingdom", c: "gb", f: "🇬🇧" },
            { n: "Canada", c: "ca", f: "🇨🇦" }, { n: "Australia", c: "au", f: "🇦🇺" },
            { n: "Germany", c: "de", f: "🇩🇪" }, { n: "France", c: "fr", f: "🇫🇷" },
            { n: "Bangladesh", c: "bd", f: "🇧🇩" }, { n: "India", c: "in", f: "🇮🇳" },
            { n: "Japan", c: "jp", f: "🇯🇵" }, { n: "Singapore", c: "sg", f: "🇸🇬" },
            { n: "Netherlands", c: "nl", f: "🇳🇱" }, { n: "Brazil", c: "br", f: "🇧🇷" },
            { n: "Italy", c: "it", f: "🇮🇹" }, { n: "Spain", c: "es", f: "🇪🇸" },
            { n: "Russia", c: "ru", f: "🇷🇺" }, { n: "Turkey", c: "tr", f: "🇹🇷" },
            { n: "South Korea", c: "kr", f: "🇰🇷" }, { n: "China", c: "cn", f: "🇨🇳" },
            { n: "Vietnam", c: "vn", f: "🇻🇳" }, { n: "Thailand", c: "th", f: "🇹🇭" },
            { n: "Indonesia", c: "id", f: "🇮🇩" }, { n: "Malaysia", c: "my", f: "🇲🇾" },
            { n: "Pakistan", c: "pk", f: "🇵🇰" }, { n: "Ukraine", c: "ua", f: "🇺🇦" },
            { n: "Poland", c: "pl", f: "🇵🇱" }, { n: "Sweden", c: "se", f: "🇸🇪" },
            { n: "Norway", c: "no", f: "🇳🇴" }, { n: "Denmark", c: "dk", f: "🇩🇰" },
            { n: "Finland", c: "fi", f: "🇫🇮" }, { n: "Switzerland", c: "ch", f: "🇨🇭" },
            { n: "Austria", c: "at", f: "🇦🇹" }, { n: "Belgium", c: "be", f: "🇧🇪" },
            { n: "Portugal", c: "pt", f: "🇵🇹" }, { n: "Greece", c: "gr", f: "🇬🇷" },
            { n: "Israel", c: "il", f: "🇮🇱" }, { n: "UAE", c: "ae", f: "🇦🇪" },
            { n: "Saudi Arabia", c: "sa", f: "🇸🇦" }, { n: "South Africa", c: "za", f: "🇿🇦" },
            { n: "Mexico", c: "mx", f: "🇲🇽" }, { n: "Argentina", c: "ar", f: "🇦🇷" },
            { n: "Colombia", c: "co", f: "🇨🇴" }, { n: "Chile", c: "cl", f: "🇨🇱" },
            { n: "Egypt", c: "eg", f: "🇪🇬" }, { n: "Nigeria", c: "ng", f: "🇳🇬" },
            { n: "Kenya", c: "ke", f: "🇰🇪" }, { n: "Philippines", c: "ph", f: "🇵🇭" },
            { n: "Hong Kong", c: "hk", f: "🇭🇰" }, { n: "Taiwan", c: "tw", f: "🇹🇼" },
            { n: "Ireland", c: "ie", f: "🇮🇪" }, { n: "New Zealand", c: "nz", f: "🇳🇿" },
            { n: "Czech Republic", c: "cz", f: "🇨🇿" }, { n: "Hungary", c: "hu", f: "🇭🇺" },
            { n: "Romania", c: "ro", f: "🇷🇴" }, { n: "Bulgaria", c: "bg", f: "🇧🇬" },
            { n: "Croatia", c: "hr", f: "🇭🇷" }, { n: "Slovakia", c: "sk", f: "🇸🇰" },
            { n: "Slovenia", c: "si", f: "🇸🇮" }, { n: "Estonia", c: "ee", f: "🇪🇪" },
            { n: "Latvia", c: "lv", f: "🇱🇻" }, { n: "Lithuania", c: "lt", f: "🇱🇹" },
            { n: "Luxembourg", c: "lu", f: "🇱🇺" }, { n: "Malta", c: "mt", f: "🇲🇹" },
            { n: "Cyprus", c: "cy", f: "🇨🇾" }, { n: "Iceland", c: "is", f: "🇮🇸" },
            { n: "Morocco", c: "ma", f: "🇲🇦" }, { n: "Algeria", c: "dz", f: "🇩🇿" },
            { n: "Tunisia", c: "tn", f: "🇹🇳" }, { n: "Peru", c: "pe", f: "🇵🇪" },
            { n: "Ecuador", c: "ec", f: "🇪🇨" }, { n: "Uruguay", c: "uy", f: "🇺🇾" },
            { n: "Paraguay", c: "py", f: "🇵🇾" }, { n: "Bolivia", c: "bo", f: "🇧🇴" },
            { n: "Kazakhstan", c: "kz", f: "🇰🇿" }, { n: "Uzbekistan", c: "uz", f: "🇺🇿" },
            { n: "Qatar", c: "qa", f: "🇶🇦" }, { n: "Kuwait", c: "kw", f: "🇰🇼" },
            { n: "Oman", c: "om", f: "🇴🇲" }, { n: "Jordan", c: "jo", f: "🇯🇴" },
            { n: "Lebanon", c: "lb", f: "🇱🇧" }, { n: "Sri Lanka", c: "lk", f: "🇱🇰" },
            { n: "Nepal", c: "np", f: "🇳🇵" }, { n: "Myanmar", c: "mm", f: "🇲🇲" },
            { n: "Cambodia", c: "kh", f: "🇰🇭" }, { n: "Laos", c: "la", f: "🇱🇦" }
        ].sort((a,b) => a.n.localeCompare(b.n));

        let selectedCountries = [];
        const dropdown = document.getElementById('countryDropdown');
        const countryList = document.getElementById('countryList');
        const searchInput = document.getElementById('countrySearch');
        const chipsContainer = document.getElementById('selectedChips');

        function renderList(data) {
            countryList.innerHTML = '';
            const available = data.filter(item => !selectedCountries.find(s => s.c === item.c));
            available.forEach(item => {
                const div = document.createElement('div');
                div.className = "country-item";
                div.innerHTML = `<span class="flag">${item.f}</span><span class="name text-sm font-medium text-gray-700">${item.n}</span>`;
                div.onclick = (e) => { e.stopPropagation(); addCountry(item); };
                countryList.appendChild(div);
            });
        }

        function addCountry(item) {
            selectedCountries.push(item);
            searchInput.value = '';
            updateChips();
            dropdown.classList.add('hidden');
        }

        function removeCountry(code) {
            selectedCountries = selectedCountries.filter(c => c.c !== code);
            updateChips();
        }

        function updateChips() {
            chipsContainer.innerHTML = '';
            selectedCountries.forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `${item.f} ${item.c.toUpperCase()} <button class="ml-2 hover:text-red-500" onclick="removeCountry('${item.c}')">&times;</button>`;
                chipsContainer.appendChild(chip);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = COUNTRY_DATA.filter(i => i.n.toLowerCase().includes(term) || i.c.toLowerCase().includes(term));
            renderList(filtered);
            dropdown.classList.remove('hidden');
        });

        searchInput.addEventListener('focus', () => {
            renderList(COUNTRY_DATA);
            dropdown.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('selectorContainer').contains(e.target)) dropdown.classList.add('hidden');
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateProxies() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const host = document.getElementById('hostname').value;

            if (!user || !pass || isNaN(count) || count <= 0) return;

            const countryPool = selectedCountries.length > 0 ? selectedCountries.map(sc => sc.c) : ['all'];
            let proxies = [];

            for (let i = 0; i < count; i++) {
                const portSuffix = (i % 99) + 1;
                const formattedSuffix = portSuffix.toString().padStart(2, '0');
                const finalPort = "110" + formattedSuffix;
                const randomCountry = countryPool[Math.floor(Math.random() * countryPool.length)];
                const cSuffix = (randomCountry === 'all') ? '' : `__cr.${randomCountry}`;
                proxies.push(`${user}${cSuffix}:${pass}@${host}:${finalPort}`);
            }

            const shuffled = shuffleArray(proxies);
            const outputArea = document.getElementById('output');
            const noOutput = document.getElementById('noOutput');
            
            noOutput.classList.add('hidden');
            outputArea.classList.remove('hidden');
            outputArea.value = shuffled.join('\n');
        }

        function copyToClipboard() {
            const textarea = document.getElementById('output');
            if(textarea.classList.contains('hidden')) return;
            textarea.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED ✅";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        function downloadAsTxt() {
            const text = document.getElementById('output').value;
            if(!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'RKB_Elite_Proxies.txt';
            a.click();
        }
    </script>
</body>
</html>
