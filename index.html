<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKB ELITE - Premium Proxy Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.6);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
        }

        /* 3D Animated Background Objects */
        .bg-glow {
            position: fixed;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .dropdown-list {
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-premium {
            background: #fff;
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-premium:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .download-btn {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-glow top-0 left-0"></div>
    <div class="bg-glow bottom-0 right-0" style="animation-delay: -10s;"></div>

    <div class="w-full max-w-2xl glass-container rounded-3xl p-8 md:p-12">
        <header class="text-center mb-10">
            <!-- Replaced Name with RKB ELITE -->
            <h1 class="text-4xl font-black tracking-tighter mb-2 italic">RKB <span class="text-slate-500 text-2xl not-italic font-light">ELITE</span></h1>
            <p class="text-slate-500 text-sm uppercase tracking-widest">Premium Proxy List Creator</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Username -->
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Username Prefix</label>
                <input type="text" id="username" placeholder="Enter prefix..." 
                    class="w-full p-4 rounded-2xl input-field outline-none">
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Password</label>
                <input type="text" id="password" placeholder="Enter password..." 
                    class="w-full p-4 rounded-2xl input-field outline-none">
            </div>

            <!-- Custom Country Selector -->
            <div class="relative md:col-span-2 space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Target Location</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                        <span id="selectedFlag" class="text-xl">🌍</span>
                    </div>
                    <input type="text" id="countrySearch" placeholder="Search for a country..." autocomplete="off"
                        onclick="toggleDropdown()" oninput="filterCountries()"
                        class="w-full pl-14 pr-12 py-4 rounded-2xl input-field outline-none cursor-pointer">
                    <div class="absolute inset-y-0 right-4 flex items-center">
                        <svg class="w-5 h-5 text-slate-500 group-focus-within:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
                
                <!-- Dropdown -->
                <div id="countryDropdown" class="hidden absolute w-full mt-2 bg-neutral-900 border border-white/10 rounded-2xl shadow-2xl overflow-hidden z-50">
                    <ul id="countryList" class="dropdown-list">
                        <!-- Content via JS -->
                    </ul>
                </div>
            </div>

            <!-- Hidden Params -->
            <input type="hidden" id="countryCode" value="all">
            <input type="hidden" id="hostname" value="gw.dataimpulse.com">
            <input type="hidden" id="portStart" value="11000">
        </div>

        <div class="mt-8 space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Quantity</label>
            <input type="number" id="count" placeholder="e.g. 500" 
                class="w-full p-4 rounded-2xl input-field outline-none">
        </div>

        <button onclick="generateProxies()" 
            class="w-full mt-10 p-5 rounded-2xl btn-premium shadow-xl">
            Generate Proxies
        </button>

        <!-- Result Section -->
        <div id="outputContainer" class="hidden mt-12 space-y-4 animate-fadeIn">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h2 class="text-lg font-bold text-white uppercase tracking-tighter">Results</h2>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="downloadAsTxt()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-xl download-btn text-xs font-bold uppercase">
                        Download .TXT
                    </button>
                    <button onclick="copyToClipboard()" id="copyBtn" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-bold uppercase transition-all">
                        Copy All
                    </button>
                </div>
            </div>
            <div class="relative">
                <textarea id="output" readonly 
                    class="w-full h-80 p-6 rounded-3xl bg-black/40 border border-white/5 text-sm font-mono text-slate-300 focus:outline-none custom-scroll leading-relaxed"></textarea>
            </div>
        </div>
    </div>

    <script>
        const countries = [
            { name: "Global mix", code: "all", flag: "🌍" },
            { name: "Afghanistan", code: "af", flag: "🇦🇫" }, { name: "Albania", code: "al", flag: "🇦🇱" },
            { name: "Algeria", code: "dz", flag: "🇩🇿" }, { name: "Argentina", code: "ar", flag: "🇦🇷" },
            { name: "Australia", code: "au", flag: "🇦🇺" }, { name: "Austria", code: "at", flag: "🇦🇹" },
            { name: "Bangladesh", code: "bd", flag: "🇧🇩" }, { name: "Belgium", code: "be", flag: "🇧🇪" },
            { name: "Brazil", code: "br", flag: "🇧🇷" }, { name: "Bulgaria", code: "bg", flag: "🇧🇬" },
            { name: "Canada", code: "ca", flag: "🇨🇦" }, { name: "Chile", code: "cl", flag: "🇨🇱" },
            { name: "China", code: "cn", flag: "🇨🇳" }, { name: "Colombia", code: "co", flag: "🇨🇴" },
            { name: "Croatia", code: "hr", flag: "🇭🇷" }, { name: "Cyprus", code: "cy", flag: "🇨🇾" },
            { name: "Czech Republic", code: "cz", flag: "🇨🇿" }, { name: "Denmark", code: "dk", flag: "🇩🇰" },
            { name: "Egypt", code: "eg", flag: "🇪🇬" }, { name: "Finland", code: "fi", flag: "🇫🇮" },
            { name: "France", code: "fr", flag: "🇫🇷" }, { name: "Germany", code: "de", flag: "🇩🇪" },
            { name: "Greece", code: "gr", flag: "🇬🇷" }, { name: "Hong Kong", code: "hk", flag: "🇭🇰" },
            { name: "Hungary", code: "hu", flag: "🇭🇺" }, { name: "India", code: "in", flag: "🇮🇳" },
            { name: "Indonesia", code: "id", flag: "🇮🇩" }, { name: "Ireland", code: "ie", flag: "🇮🇪" },
            { name: "Israel", code: "il", flag: "🇮🇱" }, { name: "Italy", code: "it", flag: "🇮🇹" },
            { name: "Japan", code: "jp", flag: "🇯🇵" }, { name: "Kazakhstan", code: "kz", flag: "🇰🇿" },
            { name: "Kuwait", code: "kw", flag: "🇰🇼" }, { name: "Malaysia", code: "my", flag: "🇲🇾" },
            { name: "Mexico", code: "mx", flag: "🇲🇽" }, { name: "Netherlands", code: "nl", flag: "🇳🇱" },
            { name: "New Zealand", code: "nz", flag: "🇳🇿" }, { name: "Norway", code: "no", flag: "🇳🇴" },
            { name: "Pakistan", code: "pk", flag: "🇵🇰" }, { name: "Peru", code: "pe", flag: "🇵🇪" },
            { name: "Philippines", code: "ph", flag: "🇵🇭" }, { name: "Poland", code: "pl", flag: "🇵🇱" },
            { name: "Portugal", code: "pt", flag: "🇵🇹" }, { name: "Romania", code: "ro", flag: "🇷🇴" },
            { name: "Russia", code: "ru", flag: "🇷🇺" }, { name: "Saudi Arabia", code: "sa", flag: "🇸🇦" },
            { name: "Singapore", code: "sg", flag: "🇸🇬" }, { name: "South Africa", code: "za", flag: "🇿🇦" },
            { name: "South Korea", code: "kr", flag: "🇰🇷" }, { name: "Spain", code: "es", flag: "🇪🇸" },
            { name: "Sweden", code: "se", flag: "🇸🇪" }, { name: "Switzerland", code: "ch", flag: "🇨🇭" },
            { name: "Taiwan", code: "tw", flag: "🇹🇼" }, { name: "Thailand", code: "th", flag: "🇹🇭" },
            { name: "Turkey", code: "tr", flag: "🇹🇷" }, { name: "Ukraine", code: "ua", flag: "🇺🇦" },
            { name: "UAE", code: "ae", flag: "🇦🇪" }, { name: "United Kingdom", code: "gb", flag: "🇬🇧" },
            { name: "United States", code: "us", flag: "🇺🇸" }, { name: "Vietnam", code: "vn", flag: "🇻🇳" }
        ];

        const dropdown = document.getElementById('countryDropdown');
        const countryList = document.getElementById('countryList');
        const countrySearch = document.getElementById('countrySearch');
        const countryCodeInput = document.getElementById('countryCode');
        const selectedFlag = document.getElementById('selectedFlag');

        function populateList(data) {
            countryList.innerHTML = '';
            data.forEach(c => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between px-6 py-4 hover:bg-white/5 cursor-pointer transition-colors border-b border-white/5 last:border-none";
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-xl">${c.flag}</span>
                        <span class="text-slate-200 font-medium">${c.name}</span>
                    </div>
                    <span class="text-slate-600 text-[10px] font-bold tracking-widest uppercase">${c.code}</span>
                `;
                li.onclick = () => selectCountry(c);
                countryList.appendChild(li);
            });
        }

        function toggleDropdown() { dropdown.classList.toggle('hidden'); }

        function selectCountry(country) {
            countrySearch.value = country.name;
            countryCodeInput.value = country.code;
            selectedFlag.innerText = country.flag;
            dropdown.classList.add('hidden');
        }

        function filterCountries() {
            const term = countrySearch.value.toLowerCase();
            const filtered = countries.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.code.toLowerCase().includes(term)
            );
            populateList(filtered);
            dropdown.classList.remove('hidden');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) dropdown.classList.add('hidden');
        });

        window.onload = () => {
            const global = countries.shift();
            countries.sort((a, b) => a.name.localeCompare(b.name));
            countries.unshift(global);
            populateList(countries);
            selectCountry(countries[0]);
        };

        function generateProxies() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const country = document.getElementById('countryCode').value.trim();
            const host = document.getElementById('hostname').value.trim();
            const start = parseInt(document.getElementById('portStart').value);
            const count = parseInt(document.getElementById('count').value);

            if (!user || !pass || isNaN(count)) {
                alert("পাসওয়ার্ড এবং ইউজারনেম দিতে হবে!");
                return;
            }

            let results = [];
            for (let i = 0; i < count; i++) {
                const currentPort = start + i;
                const countryPart = (country === 'all') ? '' : `__cr.${country}`;
                results.push(`${user}${countryPart}:${pass}@${host}:${currentPort}`);
            }

            document.getElementById('output').value = results.join('\n');
            document.getElementById('outputContainer').classList.remove('hidden');
            document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function downloadAsTxt() {
            const content = document.getElementById('output').value;
            if (!content) return;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            const timestamp = new Date().getTime();
            a.href = url;
            a.download = `proxies_${timestamp}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function copyToClipboard() {
            const copyText = document.getElementById("output");
            copyText.select();
            document.execCommand("copy");
            const btn = document.getElementById("copyBtn");
            const original = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "rgba(255,255,255,0.2)";
            setTimeout(() => {
                btn.innerText = original;
                btn.style.backgroundColor = "";
            }, 2000);
        }
    </script>
</body>
</html>
