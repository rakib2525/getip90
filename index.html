<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKB ELITE - Multi Proxy Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4; /* Very light green background */
            color: #1a202c;
            margin: 0;
            padding: 0;
        }

        .container-full {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(22, 101, 52, 0.08); /* Greenish shadow */
            border: 1px solid #dcfce7;
            width: 100%;
            max-width: 900px;
            padding: 40px;
        }

        .label-text {
            font-size: 14px;
            font-weight: 600;
            color: #166534; /* Dark green label */
            margin-bottom: 8px;
            display: block;
            margin-left: 4px;
        }

        .input-box {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 18px;
            width: 100%;
            transition: all 0.3s;
            color: #2d3748;
            font-size: 16px;
        }
        .input-box:focus {
            border-color: #22c55e; /* Green focus border */
            outline: none;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        /* Country Dropdown Style */
        #countryDropdown {
            background: white;
            border: 1px solid #dcfce7;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(22, 101, 52, 0.12);
            max-height: 350px;
            overflow-y: auto;
            z-index: 1000;
        }

        .country-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0fdf4;
            transition: background 0.2s;
        }
        .country-item:hover {
            background: #f0fdf4;
        }
        .country-item .flag { font-size: 22px; margin-right: 15px; }
        .country-item .name { flex-grow: 1; font-size: 16px; color: #166534; }
        .country-item .code { font-size: 12px; color: #86efac; font-weight: bold; }

        .chip {
            display: inline-flex;
            align-items: center;
            background: #f0fdf4;
            color: #166534;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin: 4px;
            border: 1px solid #bbf7d0;
        }
        .chip button {
            margin-left: 10px;
            color: #166534;
            font-size: 18px;
            line-height: 1;
        }
        .chip button:hover { color: #ef4444; }

        .btn-generate {
            background: linear-gradient(135deg, #22c55e 0%, #166534 100%);
            color: white;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 18px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .output-area {
            background: #064e3b; /* Deep green output box */
            color: #6ee7b7; /* Light green text */
            font-family: 'Fira Code', monospace;
            border-radius: 14px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #065f46;
        }

        /* Custom Scrollbar for Green Theme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f0fdf4; }
        ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #22c55e; }
    </style>
</head>
<body>

    <div class="container-full">
        <div class="main-card">
            <header class="mb-10 text-center">
                <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">RKB ELITE <span class="text-green-600">PRO</span></h1>
                <p class="text-green-700 text-sm mt-2 font-medium uppercase tracking-widest">Premium Green Engine Proxy Generator</p>
            </header>

            <div class="space-y-6">
                <!-- Auth Details -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="label-text">Username</label>
                        <input type="text" id="username" placeholder="Enter proxy username" class="input-box">
                    </div>
                    <div class="space-y-1">
                        <label class="label-text">Password</label>
                        <input type="text" id="password" placeholder="Enter proxy password" class="input-box">
                    </div>
                </div>

                <!-- Country Multi-Selector -->
                <div class="relative space-y-1">
                    <label class="label-text">Target Geos (Select multiple countries)</label>
                    <div class="input-box flex flex-wrap gap-2 min-h-[60px] items-center" id="selectorContainer">
                        <div id="selectedChips" class="flex flex-wrap gap-1"></div>
                        <input type="text" id="countrySearch" placeholder="Search by name or code (e.g. USA, BD)..." autocomplete="off" 
                            class="flex-grow outline-none text-base bg-transparent min-w-[200px]">
                    </div>
                    
                    <div id="countryDropdown" class="hidden absolute w-full mt-2">
                        <div id="countryList"></div>
                    </div>
                </div>

                <!-- Quantity -->
                <div class="space-y-1">
                    <label class="label-text">Quantity (Total proxies to generate)</label>
                    <input type="number" id="count" value="100" class="input-box">
                </div>

                <!-- Internal Params -->
                <input type="hidden" id="hostname" value="gw.dataimpulse.com">

                <button onclick="generateProxies()" class="btn-generate">
                    Generate & Shuffle Mixed Proxies
                </button>
            </div>

            <!-- Result Area -->
            <div id="outputContainer" class="hidden mt-10 space-y-4">
                <div class="flex justify-between items-end px-1">
                    <div>
                        <h3 class="text-lg font-bold text-green-900">Generated Proxies</h3>
                        <p class="text-xs text-green-600">Format: user:pass@host:port</p>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="copyToClipboard()" id="copyBtn" class="bg-green-100 text-green-800 px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-200 transition-colors">Copy All</button>
                        <button onclick="downloadAsTxt()" class="bg-gray-50 text-gray-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-100 transition-colors">Download .txt</button>
                    </div>
                </div>
                <textarea id="output" readonly class="w-full h-72 output-area outline-none"></textarea>
            </div>
        </div>
    </div>

    <script>
        const COUNTRY_DATA = [
            { n: "United States", c: "us", f: "🇺🇸" }, { n: "United Kingdom", c: "gb", f: "🇬🇧" },
            { n: "Canada", c: "ca", f: "🇨🇦" }, { n: "Australia", c: "au", f: "🇦🇺" },
            { n: "Germany", c: "de", f: "🇩🇪" }, { n: "France", c: "fr", f: "🇫🇷" },
            { n: "Bangladesh", c: "bd", f: "🇧🇩" }, { n: "India", c: "in", f: "🇮🇳" },
            { n: "Japan", c: "jp", f: "🇯🇵" }, { n: "Singapore", c: "sg", f: "🇸🇬" },
            { n: "Netherlands", c: "nl", f: "🇳🇱" }, { n: "Brazil", c: "br", f: "🇧🇷" },
            { n: "Italy", c: "it", f: "🇮🇹" }, { n: "Spain", c: "es", f: "🇪🇸" },
            { n: "Russia", c: "ru", f: "🇷🇺" }, { n: "Turkey", c: "tr", f: "🇹🇷" },
            { n: "South Korea", c: "kr", f: "🇰🇷" }, { n: "China", c: "cn", f: "🇨🇳" },
            { n: "Vietnam", c: "vn", f: "🇻🇳" }, { n: "Thailand", c: "th", f: "🇹🇭" },
            { n: "Indonesia", c: "id", f: "🇮🇩" }, { n: "Malaysia", c: "my", f: "🇲🇾" },
            { n: "Pakistan", c: "pk", f: "🇵🇰" }, { n: "Ukraine", c: "ua", f: "🇺🇦" },
            { n: "Poland", c: "pl", f: "🇵🇱" }, { n: "Sweden", c: "se", f: "🇸🇪" },
            { n: "Norway", c: "no", f: "🇳🇴" }, { n: "Denmark", c: "dk", f: "🇩🇰" },
            { n: "Finland", c: "fi", f: "🇫🇮" }, { n: "Switzerland", c: "ch", f: "🇨🇭" },
            { n: "Austria", c: "at", f: "🇦🇹" }, { n: "Belgium", c: "be", f: "🇧🇪" },
            { n: "Portugal", c: "pt", f: "🇵🇹" }, { n: "Greece", c: "gr", f: "🇬🇷" },
            { n: "Israel", c: "il", f: "🇮🇱" }, { n: "UAE", c: "ae", f: "🇦🇪" },
            { n: "Saudi Arabia", c: "sa", f: "🇸🇦" }, { n: "South Africa", c: "za", f: "🇿🇦" },
            { n: "Mexico", c: "mx", f: "🇲🇽" }, { n: "Argentina", c: "ar", f: "🇦🇷" },
            { n: "Colombia", c: "co", f: "🇨🇴" }, { n: "Chile", c: "cl", f: "🇨🇱" },
            { n: "Egypt", c: "eg", f: "🇪🇬" }, { n: "Nigeria", c: "ng", f: "🇳🇬" },
            { n: "Kenya", c: "ke", f: "🇰🇪" }, { n: "Philippines", c: "ph", f: "🇵🇭" },
            { n: "Hong Kong", c: "hk", f: "🇭🇰" }, { n: "Taiwan", c: "tw", f: "🇹🇼" },
            { n: "Ireland", c: "ie", f: "🇮🇪" }, { n: "New Zealand", c: "nz", f: "🇳🇿" },
            { n: "Czech Republic", c: "cz", f: "🇨🇿" }, { n: "Hungary", c: "hu", f: "🇭🇺" },
            { n: "Romania", c: "ro", f: "🇷🇴" }, { n: "Bulgaria", c: "bg", f: "🇧🇬" },
            { n: "Croatia", c: "hr", f: "🇭🇷" }, { n: "Slovakia", c: "sk", f: "🇸🇰" },
            { n: "Slovenia", c: "si", f: "🇸🇮" }, { n: "Estonia", c: "ee", f: "🇪🇪" },
            { n: "Latvia", c: "lv", f: "🇱🇻" }, { n: "Lithuania", c: "lt", f: "🇱🇹" },
            { n: "Luxembourg", c: "lu", f: "🇱🇺" }, { n: "Malta", c: "mt", f: "🇲🇹" },
            { n: "Cyprus", c: "cy", f: "🇨🇾" }, { n: "Iceland", c: "is", f: "🇮🇸" },
            { n: "Morocco", c: "ma", f: "🇲🇦" }, { n: "Algeria", c: "dz", f: "🇩🇿" },
            { n: "Tunisia", c: "tn", f: "🇹🇳" }, { n: "Peru", c: "pe", f: "🇵🇪" },
            { n: "Ecuador", c: "ec", f: "🇪🇨" }, { n: "Uruguay", c: "uy", f: "🇺🇾" },
            { n: "Paraguay", c: "py", f: "🇵🇾" }, { n: "Bolivia", c: "bo", f: "🇧🇴" },
            { n: "Kazakhstan", c: "kz", f: "🇰🇿" }, { n: "Uzbekistan", c: "uz", f: "🇺🇿" },
            { n: "Qatar", c: "qa", f: "🇶🇦" }, { n: "Kuwait", c: "kw", f: "🇰🇼" },
            { n: "Oman", c: "om", f: "🇴🇲" }, { n: "Jordan", c: "jo", f: "🇯🇴" },
            { n: "Lebanon", c: "lb", f: "🇱🇧" }, { n: "Sri Lanka", c: "lk", f: "🇱🇰" },
            { n: "Nepal", c: "np", f: "🇳🇵" }, { n: "Myanmar", c: "mm", f: "🇲🇲" },
            { n: "Cambodia", c: "kh", f: "🇰🇭" }, { n: "Laos", c: "la", f: "🇱🇦" }
        ].sort((a,b) => a.n.localeCompare(b.n));

        let selectedCountries = [];

        const dropdown = document.getElementById('countryDropdown');
        const countryList = document.getElementById('countryList');
        const searchInput = document.getElementById('countrySearch');
        const chipsContainer = document.getElementById('selectedChips');

        function renderList(data) {
            countryList.innerHTML = '';
            const available = data.filter(item => !selectedCountries.find(s => s.c === item.c));
            
            available.forEach(item => {
                const div = document.createElement('div');
                div.className = "country-item";
                div.innerHTML = `<span class="flag">${item.f}</span><span class="name">${item.n}</span><span class="code">${item.c.toUpperCase()}</span>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    addCountry(item);
                };
                countryList.appendChild(div);
            });
        }

        function addCountry(item) {
            selectedCountries.push(item);
            searchInput.value = '';
            updateChips();
            dropdown.classList.add('hidden');
            searchInput.focus();
        }

        function removeCountry(code) {
            selectedCountries = selectedCountries.filter(c => c.c !== code);
            updateChips();
        }

        function updateChips() {
            chipsContainer.innerHTML = '';
            selectedCountries.forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `${item.f} ${item.c.toUpperCase()} <button onclick="removeCountry('${item.c}')">&times;</button>`;
                chipsContainer.appendChild(chip);
            });
            if(selectedCountries.length > 0) searchInput.placeholder = "";
            else searchInput.placeholder = "Search by name or code...";
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = COUNTRY_DATA.filter(i => i.n.toLowerCase().includes(term) || i.c.toLowerCase().includes(term));
            renderList(filtered);
            dropdown.classList.remove('hidden');
        });

        searchInput.addEventListener('focus', () => {
            renderList(COUNTRY_DATA);
            dropdown.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('selectorContainer').contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateProxies() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const host = document.getElementById('hostname').value;

            if (!user || !pass || isNaN(count) || count <= 0) {
                return;
            }

            const countryPool = selectedCountries.length > 0 ? selectedCountries.map(sc => sc.c) : ['all'];
            
            let proxies = [];

            for (let i = 0; i < count; i++) {
                const portSuffix = (i % 99) + 1;
                const formattedSuffix = portSuffix.toString().padStart(2, '0');
                const finalPort = "110" + formattedSuffix;

                const randomCountry = countryPool[Math.floor(Math.random() * countryPool.length)];
                const cSuffix = (randomCountry === 'all') ? '' : `__cr.${randomCountry}`;
                proxies.push(`${user}${cSuffix}:${pass}@${host}:${finalPort}`);
            }

            const shuffledProxies = shuffleArray(proxies);
            document.getElementById('output').value = shuffledProxies.join('\n');
            document.getElementById('outputContainer').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function copyToClipboard() {
            const textarea = document.getElementById('output');
            textarea.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            btn.innerText = "COPIED ✅";
            setTimeout(() => btn.innerText = "Copy All", 2000);
        }

        function downloadAsTxt() {
            const text = document.getElementById('output').value;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'RKB_Elite_Proxies_Green.txt';
            a.click();
        }
    </script>
</body>
</html>
